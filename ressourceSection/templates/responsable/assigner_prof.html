{% extends "base_res.html" %}

{% block content %}
<div class="container mt-4">
    <h3>Assigner un module à cet enseignant</h3>
    
    <form method="POST">
        {% csrf_token %}
        
        <div class="list-group">
            {% for module in modules %}
                <div class="list-group-item d-flex justify-content-between align-items-center">
                    <span>{{ module.nom_module }}</span>
                    
                    <button class="btn btn-primary" type="submit" name="assigner" value="{{ module.idmodule }}">
                        Assigner
                    </button>
                </div>
            {% endfor %}
        </div>
    </form>
</div>
{% endblock %}
